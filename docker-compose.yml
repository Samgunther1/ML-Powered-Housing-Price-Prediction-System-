version: "3.8"

services:
  # ── MLflow Tracking Server ──────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    container_name: mlflow-server
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow/mlflow.db
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --artifacts-destination /mlflow/mlartifacts
      --allowed-hosts "mlflow,mlflow:5000,localhost,localhost:5000,0.0.0.0,0.0.0.0:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: housing-api
    ports:
      - "8000:8000"
    volumes:
      - mlflow-data:/mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_NAME=housing_price_model
      - MODEL_ALIAS=champion
    depends_on:
      mlflow:
        condition: service_healthy
    command: uvicorn scripts.Api:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Streamlit Frontend ──────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    container_name: housing-ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
      - MLFLOW_URL=http://mlflow:5000
      - MLFLOW_IFRAME_URL=http://localhost:5000
    depends_on:
      api:
        condition: service_healthy
    command: streamlit run scripts/streamlit_app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  mlflow-data:
